<style>

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #080c16; --bg2: #0d1526; --bg3: #0a0f1a;

  body {
    font-family: 'Inter', -apple-system, sans-serif;

  h1, h2, h3 { font-family: 'JetBrains Mono', monospace; }

  .btn {
    display: block; width: 100%; padding: 14px 24px; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif;

  .btn:active { transform: scale(0.97); }
  .btn-cyan { background: linear-gradient(135deg, #4ecdc4, #44a8a0); color: var(--bg); }
  .btn-yellow { background: linear-gradient(135deg, #ffd93d, #f0c020); color: var(--bg); }
  .btn-purple { background: linear-gradient(135deg, #c084fc, #a060dc); color: #fff; }
  .btn-red { background: linear-gradient(135deg, #ff6b6b, #e05555); color: #fff; }
  .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--label); }
  .btn-sm { padding: 10px 14px; font-size: 13px; border-radius: 8px; }

  input, select {
    width: 100%; padding: 12px 14px; background: var(--bg3); border: 1.5px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 16px; font-family: 'Inter', sans-serif;
    outline: none; transition: border-color 0.2s;

  input:focus, select:focus { border-color: var(--cyan); }
  input::placeholder { color: var(--muted); }

  .card { background: var(--bg2); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .badge {
    display: inline-block; padding: 4px 12px; border-radius: 20px;

  }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .text-center { text-align: center; }
  .mt-12 { margin-top: 12px; } .mt-16 { margin-top: 16px; } .mb-8 { margin-bottom: 8px; } .mb-12 { margin-bottom: 12px; } .mb-16 { margin-bottom: 16px; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  .stat-num { font-size: 24px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
  .stat-label { font-size: 11px; color: var(--label); margin-top: 2px; }

  .msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 10px; }
  .msg-ok { background: var(--cyan-bg); color: var(--cyan); }
  .msg-err { background: var(--red-bg); color: var(--red); }
  .msg-warn { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow); }

  .trade-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 10px; border-radius: 4px; font-size: 12px;

  .trade-row:nth-child(even) { background: var(--bg2); }

  .shock-btn {

    background: transparent; transition: opacity 0.2s;
  }
  .shock-btn:active { opacity: 0.7; }

  .waiting-pulse {
    animation: pulse 2s ease-in-out infinite;
  }

  .chip {
    display: inline-block; padding: 3px 8px; border-radius: 4px;
    font-size: 12px; font-family: 'JetBrains Mono', monospace;

  }
  .config-notice h2 { color: var(--red); font-size: 18px; margin-bottom: 12px; }
  .config-notice p { color: var(--label); font-size: 13px; line-height: 1.6; margin-bottom: 8px; }

  /* DWL Table */
  .dwl-table {

  .dwl-table tr { border-bottom: 1px solid var(--border); }
  .dwl-table td { padding: 8px 10px; }
  .dwl-table tr:nth-child(odd) { background: var(--bg3); }
  .dwl-table .dwl-row { background: var(--red-bg); border: 2px solid var(--red); font-weight: 700; }
  .dwl-table .label-col { color: var(--label); }
  .dwl-table .value-col { text-align: right; color: var(--yellow); font-weight: 700; font-family: 'JetBrains Mono', monospace; }

<script type="module">

let db = null;

function roomRef(path) {

function formatCountdown(ms) {
  if (ms <= 0) return "00:00";
  const totalSec = Math.ceil(ms / 1000);
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
}

function getTimeRemaining(state) {
  if (!state || !state.deadline || state.phase !== "trade") return null;
  return state.deadline - Date.now();
}

function startTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(async () => {
    const el = document.getElementById("countdown-display");
    if (!marketState || !marketState.deadline || marketState.phase !== "trade") {
      if (el) el.textContent = "";
      return;
    }
    const remaining = marketState.deadline - Date.now();
    if (el) {
      el.textContent = formatCountdown(remaining);
      el.style.color = remaining <= 30000 ? "var(--red)" : remaining <= 60000 ? "var(--yellow)" : "var(--cyan)";
      el.style.animation = remaining <= 30000 ? "pulse 1s ease-in-out infinite" : "none";
    }
    if (remaining <= 0 && currentRole === "teacher") {
      clearInterval(timerInterval);
      timerInterval = null;
      window._closeTrading();
    }
  }, 500);
}

// ════════════════════════════════════════════════════════════════
// FIXED SUPPLY-DEMAND SCHEDULE (Session 7: Beras)
// ════════════════════════════════════════════════════════════════
// Sengaja fixed supaya equilibrium predictable untuk analisis tax & DWL

const FIXED_DEMAND_WTP = [18000, 16000, 14000, 12000, 10000, 8000];
const FIXED_SUPPLY_WTA = [6000, 8000, 10000, 12000, 14000, 16000];

function getFixedSchedule(numBuyers, numSellers) {
  const buyerWTPs = [];
  for (let i = 0; i < numBuyers; i++) {
    buyerWTPs.push(FIXED_DEMAND_WTP[i % FIXED_DEMAND_WTP.length]);
  }
  const sellerWTAs = [];
  for (let i = 0; i < numSellers; i++) {
    sellerWTAs.push(FIXED_SUPPLY_WTA[i % FIXED_SUPPLY_WTA.length]);
  }
  return { buyerWTPs, sellerWTAs };
}

// ════════════════════════════════════════════════════════════════
// DWL CALCULATION FUNCTION
// ════════════════════════════════════════════════════════════════

function calculateDWL(state) {
  if (!state || !state.players) return null;

  const players = Object.values(state.players);
  const buyers = players.filter(p => p.role === "buyer").sort((a, b) => b.valuation - a.valuation);
  const sellers = players.filter(p => p.role === "seller").sort((a, b) => a.valuation - b.valuation);
  const trades = getTradesArray(state);

  // Compute baseline equilibrium (tanpa pajak/ceiling)
  let eqQ = 0, eqP = 0;
  for (let i = 0; i < Math.min(buyers.length, sellers.length); i++) {
    if (buyers[i].valuation >= sellers[i].valuation) {
      eqQ = i + 1;
      eqP = (sellers[i].valuation + buyers[i].valuation) / 2;
    } else break;
  }

  if (eqQ === 0) {
    return {
      eqPrice: 0, eqQuantity: 0, csBaseline: 0, psBaseline: 0,
      totalSurplusBaseline: 0, csActual: 0, psActual: 0,
      totalSurplusActual: 0, dwl: 0, numTrades: 0, lostTrades: 0
    };
  }

  // Consumer Surplus baseline
  let csBaseline = 0;
  for (let i = 0; i < eqQ; i++) csBaseline += buyers[i].valuation - eqP;

  // Producer Surplus baseline
  let psBaseline = 0;
  for (let i = 0; i < eqQ; i++) psBaseline += eqP - sellers[i].valuation;

  const totalSurplusBaseline = csBaseline + psBaseline;

  // Actual trades
  let csActual = 0, psActual = 0;
  trades.forEach(t => {
    const buyer = players.find(p => p.id === t.buyerId);
    const seller = players.find(p => p.id === t.sellerId);
    if (buyer && seller) {
      csActual += buyer.valuation - t.price;
      psActual += t.price - seller.valuation;
    }
  });

  const totalSurplusActual = csActual + psActual;
  const dwl = totalSurplusBaseline - totalSurplusActual;

  return {
    eqPrice: Math.round(eqP),
    eqQuantity: eqQ,
    csBaseline: Math.round(csBaseline),
    psBaseline: Math.round(psBaseline),
    totalSurplusBaseline: Math.round(totalSurplusBaseline),
    csActual: Math.round(csActual),
    psActual: Math.round(psActual),
    totalSurplusActual: Math.round(totalSurplusActual),
    dwl: Math.round(dwl),
    numTrades: trades.length,
    lostTrades: eqQ - trades.length
  };
}

function countJoined(state) {
  if (!state || !state.players) return 0;
  return Object.values(state.players).filter(p => p.joined).length;
}

function computeEquilibrium(state) {
  if (!state || !state.players) return { price: 0, quantity: 0 };
  const players = Object.values(state.players);
  const buyers = players.filter(p => p.role === "buyer").sort((a, b) => b.valuation - a.valuation);
  const sellers = players.filter(p => p.role === "seller").sort((a, b) => a.valuation - b.valuation);

  let eqQ = 0;
  for (let i = 0; i < Math.min(buyers.length, sellers.length); i++) {
    if (buyers[i].valuation >= sellers[i].valuation) eqQ = i + 1;
    else break;
  }
  if (eqQ === 0) return { price: 0, quantity: 0, buyers, sellers };
  const p = Math.round((sellers[eqQ - 1].valuation + buyers[eqQ - 1].valuation) / 2);
  return { price: p, quantity: eqQ, buyers, sellers };
}

function getTradesArray(state) {
  if (!state || !state.trades) return [];
  return Object.values(state.trades).sort((a, b) => a.time - b.time);
}

function renderChart(state) {
  if (!state || !state.players) return '<div class="card text-center" style="color:var(--muted);padding:30px;">Belum ada data</div>';

  const players = Object.values(state.players);
  const buyers = players.filter(p => p.role === "buyer").sort((a, b) => b.valuation - a.valuation);
  const sellers = players.filter(p => p.role === "seller").sort((a, b) => a.valuation - b.valuation);
  const trades = getTradesArray(state);
  const eq = computeEquilibrium(state);

  const W = 560, H = 340;
  const pad = { top: 30, right: 30, bottom: 50, left: 70 };
  const w = W - pad.left - pad.right;
  const h = H - pad.top - pad.bottom;

  const allVals = players.map(p => p.valuation);
  if (allVals.length === 0) return '';
  const maxP = Math.max(...allVals) * 1.15;
  const minP = Math.min(...allVals) * 0.75;
  const maxQ = Math.max(buyers.length, sellers.length) + 2;

  const xS = (q) => pad.left + (q / maxQ) * w;
  const yS = (p) => pad.top + h - ((p - minP) / (maxP - minP)) * h;

  const dPath = buyers.map((b, i) => `${i === 0 ? "M" : "L"}${xS(i + 1).toFixed(1)},${yS(b.valuation).toFixed(1)}`).join(" ");
  const sPath = sellers.map((s, i) => `${i === 0 ? "M" : "L"}${xS(i + 1).toFixed(1)},${yS(s.valuation).toFixed(1)}`).join(" ");

  const numT = 5;
  const step = (maxP - minP) / numT;
  const yTicks = Array.from({ length: numT + 1 }, (_, i) => Math.round(minP + i * step));

  const xTicks = [];
  for (let i = 1; i <= maxQ; i++) { if (i % 5 === 0 || i === 1) xTicks.push(i); }

  const tradeDots = trades.map((t, i) =>
    `<circle cx="${xS(i + 1).toFixed(1)}" cy="${yS(t.price).toFixed(1)}" r="5" fill="var(--purple)" stroke="var(--bg3)" stroke-width="1.5" opacity="0.9"><animate attributeName="r" from="9" to="5" dur="0.4s" fill="freeze"/></circle>`
  ).join("");

  // DWL visualization (area yang hilang karena tax/shock)
  let dwlAreaSvg = "";
  const dwlData = calculateDWL(state);
  if (dwlData && dwlData.lostTrades > 0 && eq.quantity > 0) {
    const actualQ = trades.length;
    if (actualQ < eq.quantity) {
      const x1 = xS(actualQ + 1);
      const x2 = xS(eq.quantity);
      const y_eq = yS(eq.price);
      const y_top = yS(buyers[eq.quantity - 1]?.valuation || 0);
      const y_bottom = yS(sellers[eq.quantity - 1]?.valuation || 0);
      
      dwlAreaSvg = `
        <polygon points="${x1},${y_top} ${x2},${y_top} ${x2},${y_eq} ${x1},${y_eq}" fill="var(--red)" opacity="0.15" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="4,2"/>
        <path d="M ${x1} ${y_eq} L ${x2} ${y_eq}" stroke="var(--red)" stroke-width="2" stroke-dasharray="6,4"/>
      `;
    }
  }

  let eqSvg = "";
  if (eq.quantity > 0) {
    eqSvg = `
      <line x1="${xS(eq.quantity)}" x2="${xS(eq.quantity)}" y1="${yS(eq.price)}" y2="${pad.top + h}" stroke="var(--yellow)" stroke-width="1.5" stroke-dasharray="6,4"/>
      <line x1="${pad.left}" x2="${xS(eq.quantity)}" y1="${yS(eq.price)}" y2="${yS(eq.price)}" stroke="var(--yellow)" stroke-width="1.5" stroke-dasharray="6,4"/>
      <circle cx="${xS(eq.quantity)}" cy="${yS(eq.price)}" r="6" fill="var(--yellow)" stroke="var(--bg3)" stroke-width="2"/>
      <text x="${xS(eq.quantity) + 10}" y="${yS(eq.price) - 8}" fill="var(--yellow)" font-size="11" font-weight="700" font-family="JetBrains Mono,monospace">E*: ${fmt(eq.price)} × ${eq.quantity}</text>
    `;
  }

  let ceilingSvg = "";
  if (state.priceCeiling) {
    const cy = yS(state.priceCeiling);
    ceilingSvg = `
      <line x1="${pad.left}" x2="${W - pad.right}" y1="${cy}" y2="${cy}" stroke="var(--red)" stroke-width="2" stroke-dasharray="8,4"/>
      <text x="${W - pad.right - 4}" y="${cy - 6}" fill="var(--red)" font-size="10" font-weight="700" text-anchor="end" font-family="JetBrains Mono,monospace">HET</text>
    `;
  }

  return `<div class="chart-wrap">
    <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="background:var(--bg3);border-radius:12px;">
      ${yTicks.map(t => `<line x1="${pad.left}" x2="${W - pad.right}" y1="${yS(t)}" y2="${yS(t)}" stroke="var(--border)" stroke-width="0.5"/>`).join("")}
      <line x1="${pad.left}" x2="${pad.left}" y1="${pad.top}" y2="${pad.top + h}" stroke="#3a4a6a" stroke-width="1.5"/>
      <line x1="${pad.left}" x2="${pad.left + w}" y1="${pad.top + h}" y2="${pad.top + h}" stroke="#3a4a6a" stroke-width="1.5"/>
      ${yTicks.map(t => `<text x="${pad.left - 8}" y="${yS(t) + 4}" text-anchor="end" fill="var(--label)" font-size="10" font-family="JetBrains Mono,monospace">${fmt(t)}</text>`).join("")}
      ${xTicks.map(t => `<text x="${xS(t)}" y="${pad.top + h + 18}" text-anchor="middle" fill="var(--label)" font-size="10" font-family="JetBrains Mono,monospace">${t}</text>`).join("")}
      <text x="${W / 2}" y="${H - 4}" text-anchor="middle" fill="var(--label)" font-size="11" font-weight="600">Quantity</text>
      <text x="14" y="${H / 2}" text-anchor="middle" fill="var(--label)" font-size="11" font-weight="600" transform="rotate(-90,14,${H / 2})">Price (Rp)</text>
      <path d="${dPath}" fill="none" stroke="var(--cyan)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="${xS(buyers.length) + 6}" y="${yS(buyers[buyers.length - 1]?.valuation || 0)}" fill="var(--cyan)" font-size="12" font-weight="700">D</text>
      <path d="${sPath}" fill="none" stroke="var(--red)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="${xS(sellers.length) + 6}" y="${yS(sellers[sellers.length - 1]?.valuation || 0)}" fill="var(--red)" font-size="12" font-weight="700">S</text>
      ${dwlAreaSvg}
      ${eqSvg}
      ${ceilingSvg}
      ${tradeDots}
    </svg>
  </div>`;
}

function init() {
  if (!isConfigured) {
    document.getElementById("app").innerHTML = `
      <div class="config-notice">
        <h2>⚠️ Firebase Belum Dikonfigurasi</h2>
        <p>Update FIREBASE_CONFIG di dalam script ini.</p>
      </div>`;
    return;
  }

  const app = initializeApp(FIREBASE_CONFIG);
  db = getDatabase(app);
  showRoleSelect();
}

function showRoleSelect() {
  if (unsubscribe) unsubscribe();
  roomCode = null;
  currentRole = null;

  document.getElementById("app").innerHTML = `
    <div class="container" style="display:flex;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;">
      <div style="width:100%;max-width:400px;">
        <div class="text-center mb-16">
          <div style="font-size:48px;margin-bottom:8px;">📊</div>
          <h1 style="font-size:22px;color:var(--text);margin-bottom:4px;">Market Simulator</h1>
          <p style="color:var(--muted);font-size:14px;">Session 7: Tax Incidence & DWL</p>
        </div>

        <div class="card mb-12">

}

window._enterRoom = function() {
  const code = document.getElementById("room-code-input")?.value?.toUpperCase()?.trim()?.replace(/[^A-Z0-9\-]/g, "");
  if (!code || code.length < 2) {
    document.getElementById("room-msg").innerHTML = '<div class="msg msg-err">Masukkan kode kelas</div>';
    return;
  }
  roomCode = code;
  showRoomRoleSelect();
};

function showRoomRoleSelect() {
  if (unsubscribe) unsubscribe();

  document.getElementById("app").innerHTML = `
    <div class="container" style="display:flex;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;">
      <div style="width:100%;max-width:400px;">
        <div class="text-center mb-16">
          <div style="font-size:48px;margin-bottom:8px;">📊</div>
          <h1 style="font-size:22px;color:var(--text);margin-bottom:4px;">Market Simulator</h1>
          <div style="margin-top:6px;"><span class="badge" style="background:var(--cyan-bg);color:var(--cyan);font-size:14px;padding:6px 16px;">Room: ${roomCode}</span></div>
        </div>

        <button class="btn btn-yellow mb-12" onclick="window._showTeacherLogin()">👨‍🏫 Saya Dosen</button>

        <div id="teacher-login" style="display:none;" class="mb-12">
          <div class="card">
            <div style="color:var(--label);font-size:12px;margin-bottom:6px;">Password Dosen</div>
            <div style="display:flex;gap:8px;">

let teacherHash = null;
(async () => {
  const data = new TextEncoder().encode("dosen123");
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  teacherHash = Array.from(new Uint8Array(hashBuffer)).map(x => x.toString(16).padStart(2, '0')).join('');
})();

window._showTeacherLogin = function() {
  const el = document.getElementById("teacher-login");
  if (el) el.style.display = el.style.display === "none" ? "block" : "none";
};

window._checkTeacherPw = async function() {
  const pw = document.getElementById("teacher-pw")?.value;
  const msgEl = document.getElementById("pw-msg");
  if (!pw) return;

  const data = new TextEncoder().encode(pw);
  const hashBuffer = await crypto.subtle.digest('SHA-256', data);
  const inputHash = Array.from(new Uint8Array(hashBuffer)).map(x => x.toString(16).padStart(2, '0')).join('');

  if (inputHash === teacherHash) {
    window._selectRole("teacher");
  } else {
    if (msgEl) msgEl.innerHTML = '<div class="msg msg-err" style="margin-top:6px;padding:6px 10px;font-size:12px;">Password salah</div>';
  }
};

window._selectRole = function(role) {
  if (!role) return;
  currentRole = role;
  if (role === "teacher") {
    showTeacher();
  } else {
    showStudent(role);
  }
};

window._createMarket = async function() {
  const total = parseInt(document.getElementById("num-students")?.value) || 42;
  const totalRounds = parseInt(document.getElementById("num-rounds")?.value) || 2;
  const numSellers = Math.floor(total / 2);
  const numBuyers = total - numSellers;

  const sched = getFixedSchedule(numBuyers, numSellers);
  const players = {};

  for (let i = 1; i <= numBuyers; i++) {
    const bid = `B${String(i).padStart(2, "0")}`;
    players[bid] = { id: bid, role: "buyer", valuation: sched.buyerWTPs[i-1], name: "", joined: false, totalSurplus: 0 };
  }
  for (let i = 1; i <= numSellers; i++) {
    const sid = `S${String(i).padStart(2, "0")}`;
    players[sid] = { id: sid, role: "seller", valuation: sched.sellerWTAs[i-1], name: "", joined: false, totalSurplus: 0 };
  }

  await set(marketRef(), {
    phase: "join",
    good: "Beras",
    unit: "Rp",
    round: 1,
    totalRounds: totalRounds,
    numBuyers: numBuyers,
    numSellers: numSellers,
    players: players,
    trades: {},
    pending: {},
    roundHistory: {},
    deadline: null,
    priceCeiling: null,
    shockLabel: null,
    tax: null,
    createdAt: Date.now(),
  });
  if (teacherHash) {
    await set(ref(db, `rooms/${roomCode}/teacherHash`), teacherHash);
  }
};

window._openTrading = async function() {
  const mins = parseInt(document.getElementById("round-time-input")?.value) || 5;
  const deadline = Date.now() + mins * 60 * 1000;
  await update(marketRef(), { phase: "trade", deadline: deadline, roundMinutes: mins });
};

window._closeTrading = async function() {
  const snap = await get(marketRef());
  const state = snap.val();
  if (!state) return;

  const trades = state.trades ? Object.values(state.trades) : [];
  const updates = {};
  const dwlData = calculateDWL(state);

  trades.forEach(t => {
    const buyer = state.players[t.buyerId];
    const seller = state.players[t.sellerId];
    if (buyer && seller) {
      const buyerSurplus = buyer.valuation - t.price;
      const sellerSurplus = t.price - seller.valuation;
      updates[`players/${t.buyerId}/totalSurplus`] = (buyer.totalSurplus || 0) + buyerSurplus;
      updates[`players/${t.sellerId}/totalSurplus`] = (seller.totalSurplus || 0) + sellerSurplus;
    }
  });

  updates[`roundHistory/round_${state.round}`] = {
    trades: state.trades || {},
    round: state.round,
    dwlCalculation: dwlData,
    shockLabel: state.shockLabel || null,
    priceCeiling: state.priceCeiling || null,
  };

  const currentRound = state.round || 1;
  const totalRounds = state.totalRounds || 2;

  if (currentRound >= totalRounds) {
    updates["phase"] = "final";
  } else {
    updates["phase"] = "results";
  }

  await update(marketRef(), updates);
};

window._nextRound = async function() {
  const snap = await get(marketRef());
  const state = snap.val();
  if (!state) return;

  const sched = getFixedSchedule(state.numBuyers, state.numSellers);
  const updates = {};

  Object.entries(state.players).forEach(([id, p], idx) => {
    if (p.role === "buyer") {
      updates[`players/${id}/valuation`] = sched.buyerWTPs[parseInt(id.substring(1))-1];
    } else {
      updates[`players/${id}/valuation`] = sched.sellerWTAs[parseInt(id.substring(1))-1];
    }
  });

  const mins = parseInt(document.getElementById("round-time-input")?.value) || state.roundMinutes || 5;
  updates["round"] = (state.round || 1) + 1;
  updates["trades"] = {};
  updates["pending"] = {};
  updates["phase"] = "trade";
  updates["deadline"] = Date.now() + mins * 60 * 1000;
  updates["roundMinutes"] = mins;
  updates["shockLabel"] = null;
  updates["priceCeiling"] = null;
  updates["tax"] = null;

  await update(marketRef(), updates);
};

window._resetMarket = async function() {
  if (!confirm("Reset pasar?")) return;
  await set(marketRef(), { phase: "idle" });
};

window._applyShock = async function(type) {
  const snap = await get(marketRef());
  const state = snap.val();
  if (!state || !state.players) return;

  const updates = {};

  if (type === "supply_up") {
    Object.entries(state.players).forEach(([id, p]) => {
      if (p.role === "seller") {
        updates[`players/${id}/valuation`] = Math.round(p.valuation * 1.3);
      }
    });
    updates["shockLabel"] = "💰 PAJAK: Biaya seller naik 30% (WTA naik)";
  } else if (type === "supply_down") {
    Object.entries(state.players).forEach(([id, p]) => {
      if (p.role === "seller") {
        updates[`players/${id}/valuation`] = Math.round(p.valuation * 0.7);
      }
    });
    updates["shockLabel"] = "📉 NORMAL: Biaya seller turun (pajak dihapus)";
  }

  updates["trades"] = {};
  updates["pending"] = {};
  updates["phase"] = "trade";

  await update(marketRef(), updates);
};

  if (state.phase === "join") {
    phaseUI = `
      <div class="text-center" style="padding:30px;">
        <div style="font-size:40px;" class="waiting-pulse mb-8">⏳</div>
        <div style="font-size:16px;">Menunggu dosen buka trading...</div>
        <div style="font-size:13px;color:var(--muted);margin-top:8px;">Valuasimu: Rp${fmt(me.valuation)}</div>
      </div>`;
  } else if (state.phase === "trade" && !myTrade) {
    phaseUI = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h3 style="color:var(--yellow);font-size:16px;margin:0;">🤝 Nego</h3>
        ${state.deadline ? `<div id="countdown-display" style="font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:800;color:var(--cyan);">${formatCountdown(getTimeRemaining(state))}</div>` : ""}
      </div>
      <p style="color:var(--label);font-size:13px;margin-bottom:14px;">Input ID partner dan harga yang <strong>SAMA PERSIS</strong>.</p>
      <div class="setup-field">
        <label>Partner ID</label>
        <input id="partner-input" placeholder="${isBuyer ? "S01" : "B01"}" style="text-transform:uppercase;font-family:'JetBrains Mono',monospace;">
      </div>
      <div class="setup-field">
        <label>Harga</label>
        <input id="price-input" type="number" placeholder="12000" style="color:var(--yellow);font-size:18px;font-family:'JetBrains Mono',monospace;">
      </div>
      <button class="btn btn-purple mt-12" onclick="window._submitTrade('${playerId}')">Submit</button>
      <div id="trade-msg"></div>`;
  } else if (myTrade) {
    phaseUI = `
      <div class="card text-center">
        <div style="font-size:36px;margin-bottom:8px;">🎉</div>
        <div style="grid-template-columns:1fr 1fr;gap:10px;display:grid;margin-top:12px;">
          <div class="card" style="margin:0;background:var(--purple-bg);border:1px solid var(--purple);">
            <div class="stat-label">Deal</div>
            <div class="stat-num" style="color:var(--purple);">${fmt(myTrade.price)}</div>
          </div>
          <div class="card" style="margin:0;">
            <div class="stat-label">Surplus</div>
            <div class="stat-num" style="color:${surplus >= 0 ? "var(--cyan)" : "var(--red)"};">${surplus >= 0 ? "+" : ""}${fmt(surplus)}</div>
          </div>
        </div>
      </div>`;
  }

  if (state.phase === "results") {
    phaseUI += `
      <div class="mt-16">
        <div class="card text-center">
          <div class="stat-label">Total (semua round)</div>
          <div class="stat-num" style="color:var(--yellow);">+${fmt(me.totalSurplus || 0)}</div>
        </div>
        
        ${(() => {
          const dwlData = calculateDWL(state);
          if (!dwlData) return "";
          return `
            <div class="card mt-12" style="background:var(--red-bg);border:1px solid var(--red);">
              <div style="color:var(--red);font-size:13px;font-weight:600;margin-bottom:10px;">📊 DWL Round ${state.round || 1}</div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">
                <div style="background:var(--bg2);padding:8px;border-radius:6px;">
                  <div style="color:var(--label);font-size:10px;">P* Teori</div>
                  <div style="color:var(--yellow);font-size:16px;font-weight:800;font-family:'JetBrains Mono',monospace;">${fmt(dwlData.eqPrice)}</div>
                </div>
                <div style="background:var(--bg2);padding:8px;border-radius:6px;">
                  <div style="color:var(--label);font-size:10px;">Q* Teori</div>
                  <div style="color:var(--yellow);font-size:16px;font-weight:800;font-family:'JetBrains Mono',monospace;">${dwlData.eqQuantity}</div>
                </div>
              </div>
              <div style="background:var(--bg3);padding:10px;border-radius:6px;margin-bottom:10px;">
                <table style="width:100%;font-size:11px;">
                  <tr style="border-bottom:1px solid var(--border);">
                    <td style="color:var(--label);padding:4px 0;">Total Surplus (baseline)</td>
                    <td style="text-align:right;color:var(--cyan);font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 0;">Rp${fmt(dwlData.totalSurplusBaseline)}</td>
                  </tr>
                  <tr style="border-bottom:1px solid var(--border);">
                    <td style="color:var(--label);padding:4px 0;">Total Surplus (aktual)</td>
                    <td style="text-align:right;color:var(--cyan);font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px 0;">Rp${fmt(dwlData.totalSurplusActual)}</td>
                  </tr>
                  <tr style="background:var(--red-bg);border:1px solid var(--red);">
                    <td style="color:var(--red);font-weight:700;padding:6px 0;">DWL</td>
                    <td style="text-align:right;color:var(--red);font-weight:800;font-family:'JetBrains Mono',monospace;font-size:12px;padding:6px 0;">Rp${fmt(dwlData.dwl)}</td>
                  </tr>
                </table>
              </div>
              <div style="background:var(--bg2);padding:8px;border-radius:6px;text-align:left;">
                <div style="color:var(--label);font-size:10px;margin-bottom:6px;"><strong>Analisis:</strong></div>
                <div style="color:var(--label);font-size:10px;line-height:1.4;">
                  Transaksi: ${dwlData.numTrades}/${dwlData.eqQuantity}. ${dwlData.lostTrades} transaksi hilang.
                  <br>Loss efficiency: Rp${fmt(dwlData.dwl)} karena ${state.tax ? "pajak" : state.priceCeiling ? "HET" : "shock"}.
                </div>
              </div>
            </div>
          `;
        })()}

        <div style="color:var(--muted);font-size:13px;margin-top:10px;text-align:center;" class="waiting-pulse">⏳ Round berikutnya...</div>
      </div>`;
  }

  if (state.phase === "final") {
    const allPlayers = Object.values(state.players).filter(p => p.joined).sort((a, b) => (b.totalSurplus || 0) - (a.totalSurplus || 0));
    const myRank = allPlayers.findIndex(p => p.id === playerId) + 1;
    phaseUI = `
      <div class="text-center" style="padding:20px 0;">
        <div style="font-size:48px;margin-bottom:8px;">🏆</div>
        <h2 style="color:var(--yellow);font-size:20px;margin-bottom:4px;">Peringkat #${myRank}/${allPlayers.length}</h2>
        <div class="card">
          <div class="stat-label">Total Surplus</div>
          <div class="stat-num" style="color:var(--yellow);">${(me.totalSurplus || 0) > 0 ? "+" : ""}${fmt(me.totalSurplus || 0)}</div>
        </div>
      </div>`;
  }

  document.getElementById("app").innerHTML = `
    <div class="container">
      <div style="background:${isBuyer ? "linear-gradient(135deg, #0d2520, #0a1a18)" : "linear-gradient(135deg, #200d0d, #1a0a0a)"};border-radius:12px;padding:16px;margin-bottom:16px;border:2px solid ${isBuyer ? "#4ecdc430" : "#ff6b6b30"};">
        <div style="display:flex;justify-content:space-between;">
          <div>
            <div style="color:var(--label);font-size:11px;">${playerId} — ${me.name} | R${state.round || 1}</div>
            <div style="color:${isBuyer ? "var(--cyan)" : "var(--red)"};font-size:20px;font-weight:800;margin-top:4px;">
              ${isBuyer ? "🛒 BUYER" : "🏪 SELLER"}
            </div>
          </div>
          <div style="text-align:right;">
            <div style="color:var(--label);font-size:11px;">${isBuyer ? "Max WTP" : "Min WTA"}</div>
            <div style="color:var(--yellow);font-size:22px;font-weight:800;font-family:'JetBrains Mono',monospace;">${fmt(me.valuation)}</div>
          </div>
        </div>
      </div>

      ${state.tax ? `<div class="msg mb-12" style="background:var(--purple-bg);color:var(--purple);border:1px solid var(--purple);">💰 Pajak: Rp${fmt(state.tax)}/unit (seller)</div>` : ""}
      ${state.shockLabel ? `<div class="msg msg-warn mb-12">${state.shockLabel}</div>` : ""}

      ${phaseUI}

      <div style="height:40px;"></div>
    </div>`;
}

window._joinGame = async function(playerId) {
  const nameInput = document.getElementById("name-input");
  if (!nameInput || !nameInput.value.trim()) return;

  await update(ref(db, `rooms/${roomCode}/market/players/${playerId}`), {
    name: nameInput.value.trim(),
    joined: true,
  });
};

window._submitTrade = async function(playerId) {
  const partnerRaw = document.getElementById("partner-input")?.value?.toUpperCase()?.trim();
  const priceRaw = parseInt(document.getElementById("price-input")?.value);
  const msgEl = document.getElementById("trade-msg");

  const showMsg = (text, ok, warn) => {
    const cls = ok ? "msg-ok" : warn ? "msg-warn" : "msg-err";
    if (msgEl) msgEl.innerHTML = `<div class="msg ${cls} mt-12" style="font-size:12px;">${text}</div>`;
  };

  if (!partnerRaw || !priceRaw) { showMsg("Isi partner ID dan harga", false); return; }

  if (marketState?.deadline && Date.now() > marketState.deadline) {
    showMsg("Waktu habis", false); return;
  }

  const snap = await get(marketRef());
  const state = snap.val();
  if (!state || !state.players) { showMsg("Market error", false); return; }

  const me = state.players[playerId];
  if (!me) { showMsg("Player error", false); return; }

  const isBuyer = me.role === "buyer";
  const partner = state.players[partnerRaw];
  if (!partner) { showMsg(`ID "${partnerRaw}" tidak ada`, false); return; }

  if (isBuyer && partner.role !== "seller") { showMsg("Partner harus seller", false); return; }
  if (!isBuyer && partner.role !== "buyer") { showMsg("Partner harus buyer", false); return; }

  if (isBuyer && priceRaw > me.valuation) { showMsg(`Harga > WTP (${fmt(me.valuation)})`, false); return; }
  if (!isBuyer && priceRaw < me.valuation) { showMsg(`Harga < WTA (${fmt(me.valuation)})`, false); return; }

  const existingTrades = state.trades ? Object.values(state.trades) : [];
  if (existingTrades.find(t => t.buyerId === playerId || t.sellerId === playerId)) {
    showMsg("Sudah bertransaksi", false); return;
  }
  if (existingTrades.find(t => t.buyerId === partnerRaw || t.sellerId === partnerRaw)) {
    showMsg("Partner sudah bertransaksi", false); return;
  }

  const buyerId = isBuyer ? playerId : partnerRaw;
  const sellerId = isBuyer ? partnerRaw : playerId;
  const pendingKey = `${buyerId}_${sellerId}`;

  await update(ref(db, `rooms/${roomCode}/market/pending/${pendingKey}/${playerId}`), {
    partnerId: partnerRaw,
    price: priceRaw,
    time: Date.now()
  });

  const pendingSnap = await get(ref(db, `rooms/${roomCode}/market/pending/${pendingKey}/${partnerRaw}`));
  const partnerPending = pendingSnap.val();

  if (!partnerPending) {
    showMsg(`Tunggu ${partnerRaw} konfirmasi (${fmt(priceRaw)})`, false, true);
    return;
  }

  if (partnerPending.price !== priceRaw) {
    showMsg(`Harga tidak cocok: Kamu ${fmt(priceRaw)}, ${partnerRaw} ${fmt(partnerPending.price)}`, false);
    await set(ref(db, `rooms/${roomCode}/market/pending/${pendingKey}/${playerId}`), null);
    return;
  }

  if (partnerPending.partnerId !== playerId) {
    showMsg(`${partnerRaw} tidak pilih kamu`, false);
    await set(ref(db, `rooms/${roomCode}/market/pending/${pendingKey}/${playerId}`), null);
    return;
  }

  await update(ref(db, `rooms/${roomCode}/market/trades/${pendingKey}`), {
    buyerId, sellerId, price: priceRaw, time: Date.now()
  });

  await set(ref(db, `rooms/${roomCode}/market/pending/${pendingKey}`), null);

  showMsg("✅ Transaksi OK!", true);
};

init();

</script>

<div id="app">
  <div class="loading-screen">Loading...</div>
</div>

</body>
</html>
