<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Market Simulator — Supply & Demand</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700;800&family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #080c16; --bg2: #0d1526; --bg3: #0a0f1a;
    --border: #1a2540; --text: #e0e6f0; --muted: #6a7a9a; --label: #8a9aba;
    --cyan: #4ecdc4; --red: #ff6b6b; --yellow: #ffd93d; --purple: #c084fc;
    --cyan-bg: #0d2520; --red-bg: #200d0d; --yellow-bg: #2a1f0a; --purple-bg: #1a1f3a;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: linear-gradient(180deg, var(--bg) 0%, #0a1020 100%);
    color: var(--text); min-height: 100vh; min-height: 100dvh;
  }

  .container { max-width: 540px; margin: 0 auto; padding: 16px; }

  h1, h2, h3 { font-family: 'JetBrains Mono', monospace; }

  .btn {
    display: block; width: 100%; padding: 14px 24px; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 700; cursor: pointer; font-family: 'Inter', sans-serif;
    transition: transform 0.1s, opacity 0.2s; text-align: center;
  }
  .btn:active { transform: scale(0.97); }
  .btn-cyan { background: linear-gradient(135deg, #4ecdc4, #44a8a0); color: var(--bg); }
  .btn-yellow { background: linear-gradient(135deg, #ffd93d, #f0c020); color: var(--bg); }
  .btn-purple { background: linear-gradient(135deg, #c084fc, #a060dc); color: #fff; }
  .btn-red { background: linear-gradient(135deg, #ff6b6b, #e05555); color: #fff; }
  .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--label); }
  .btn-sm { padding: 10px 14px; font-size: 13px; border-radius: 8px; }

  input, select {
    width: 100%; padding: 12px 14px; background: var(--bg3); border: 1.5px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 16px; font-family: 'Inter', sans-serif;
    outline: none; transition: border-color 0.2s;
  }
  input:focus, select:focus { border-color: var(--cyan); }
  input::placeholder { color: var(--muted); }

  .card { background: var(--bg2); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .badge {
    display: inline-block; padding: 4px 12px; border-radius: 20px;
    font-size: 12px; font-weight: 700;
  }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .text-center { text-align: center; }
  .mt-12 { margin-top: 12px; } .mt-16 { margin-top: 16px; } .mb-8 { margin-bottom: 8px; } .mb-12 { margin-bottom: 12px; } .mb-16 { margin-bottom: 16px; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  .stat-num { font-size: 24px; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
  .stat-label { font-size: 11px; color: var(--label); margin-top: 2px; }

  .msg { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-top: 10px; }
  .msg-ok { background: var(--cyan-bg); color: var(--cyan); }
  .msg-err { background: var(--red-bg); color: var(--red); }
  .msg-warn { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow); }

  .trade-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 10px; border-radius: 4px; font-size: 12px;
  }
  .trade-row:nth-child(even) { background: var(--bg2); }

  .shock-btn {
    flex: 1; min-width: 0; padding: 10px 8px; border-radius: 8px;
    font-size: 11px; font-weight: 600; cursor: pointer; text-align: center; border: 1.5px solid;
    background: transparent; transition: opacity 0.2s;
  }
  .shock-btn:active { opacity: 0.7; }

  .radio-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .radio-opt {
    display: flex; align-items: center; gap: 12px; padding: 12px 16px;
    background: var(--bg2); border-radius: 8px; border: 2px solid var(--border);
    cursor: pointer; transition: border-color 0.2s;
  }
  .radio-opt.active { border-color: var(--cyan); background: #1a2f50; }
  .radio-opt input { accent-color: var(--cyan); flex-shrink: 0; }
  .radio-opt span { flex: 1; }

  .waiting-pulse {
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

  .chip {
    display: inline-block; padding: 3px 8px; border-radius: 4px;
    font-size: 12px; font-family: 'JetBrains Mono', monospace;
    background: var(--purple-bg); color: var(--purple); margin: 2px;
  }

  .hidden { display: none; }

  /* SVG chart */
  .chart-wrap { margin: 12px 0; }
  .chart-wrap svg { width: 100%; border-radius: 12px; }

  /* Setup form custom inputs */
  .setup-field { margin-bottom: 10px; }
  .setup-field label { display: block; color: var(--label); font-size: 12px; margin-bottom: 4px; }
  .setup-field input { font-family: 'JetBrains Mono', monospace; }

  /* Scrollable trade log */
  .trade-log { max-height: 200px; overflow-y: auto; margin-top: 8px; }

  .loading-screen {
    min-height: 100vh; min-height: 100dvh;
    display: flex; align-items: center; justify-content: center;
    color: var(--cyan); font-family: 'JetBrains Mono', monospace;
  }

  .config-notice {
    background: var(--red-bg); border: 2px solid var(--red); border-radius: 12px;
    padding: 20px; margin: 40px 16px; text-align: center;
  }
  .config-notice h2 { color: var(--red); font-size: 18px; margin-bottom: 12px; }
  .config-notice p { color: var(--label); font-size: 13px; line-height: 1.6; margin-bottom: 8px; }
  .config-notice code {
    display: block; background: var(--bg3); padding: 12px; border-radius: 6px;
    font-size: 12px; color: var(--yellow); margin: 12px 0; text-align: left;
    word-break: break-all; font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>

const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

  beras: { label: "Beras (1 kg)", buyerMin: 8000, buyerMax: 18000, sellerMin: 6000, sellerMax: 15000, unit: "Rp", good: "Beras" },
  buku: { label: "Buku Bekas Mikroekonomi", buyerMin: 20000, buyerMax: 80000, sellerMin: 15000, sellerMax: 70000, unit: "Rp", good: "Buku Bekas" },
  cabai: { label: "Cabai Merah (1 kg)", buyerMin: 20000, buyerMax: 60000, sellerMin: 15000, sellerMax: 50000, unit: "Rp", good: "Cabai" },

// ─── Init ───
function init() {

    document.getElementById("app").innerHTML = `
      <div class="config-notice">
        <h2>⚠️ Firebase Belum Dikonfigurasi</h2>

        <code>const FIREBASE_CONFIG = {<br>&nbsp;&nbsp;apiKey: "AIza...",<br>&nbsp;&nbsp;authDomain: "your-project.firebaseapp.com",<br>&nbsp;&nbsp;databaseURL: "https://your-project-default-rtdb...",<br>&nbsp;&nbsp;...<br>};</code>

// ─── ROLE SELECT SCREEN ───
function showRoleSelect() {
  const hasMarket = marketState && marketState.phase && marketState.phase !== "idle";
  
  document.getElementById("app").innerHTML = `
    <div class="container" style="display:flex;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;">

        <div class="text-center mb-16">

          <h1 style="font-size:22px;color:var(--text);margin-bottom:4px;">Market Simulator</h1>
          <p style="color:var(--muted);font-size:14px;">Supply & Demand — Interactive</p>
        </div>

        <button class="btn btn-yellow mb-12" onclick="window._showTeacherLogin()">
          👨‍🏫 Saya Dosen
        </button>

        <div id="teacher-login" style="display:none;" class="mb-12">
          <div class="card">
            <div style="color:var(--label);font-size:12px;margin-bottom:6px;">Password Dosen</div>
            <div style="display:flex;gap:8px;">
              <input id="teacher-pw" type="password" placeholder="Masukkan password" style="flex:1;"
                onkeydown="if(event.key==='Enter')window._checkTeacherPw()">
              <button class="btn btn-yellow" style="width:auto;padding:10px 16px;font-size:14px;" onclick="window._checkTeacherPw()">OK</button>
            </div>
            <div id="pw-msg" style="margin-top:6px;"></div>
          </div>
        </div>

        <div class="text-center" style="color:var(--border);font-size:13px;margin:12px 0;">— atau —</div>

        <div style="display:flex;gap:8px;">
          <input id="role-id-input" placeholder="ID kamu (contoh: B05, S12)" 
            style="flex:1;text-transform:uppercase;font-family:'JetBrains Mono',monospace;" 
            onkeydown="if(event.key==='Enter')window._selectRole(this.value.toUpperCase().trim())">
          <button class="btn btn-cyan" style="width:auto;padding:12px 20px;" 
            onclick="window._selectRole(document.getElementById('role-id-input').value.toUpperCase().trim())">
            Masuk
          </button>
        </div>

        <div id="market-status" class="mt-16 text-center" style="display:none;">
          <div class="card" style="padding:10px;">
            <span style="color:var(--cyan);font-size:13px;" id="status-text"></span>
          </div>
        </div>
      </div>
    </div>`;

  // Listen for market state to show status
  if (unsubscribe) unsubscribe();
  unsubscribe = onValue(ref(db, "market"), (snap) => {

    }

// ─── Teacher password (ganti sesuai keinginan) ───
const TEACHER_PASSWORD = "dosen123";

  currentRole = role;
  if (role === "teacher") {
    showTeacher();
  } else {
    showStudent(role);

// ─── HELPERS ───
function countJoined(state) {
  if (!state || !state.players) return 0;
  return Object.values(state.players).filter(p => p.joined).length;
}

function rng(min, max) { return Math.round(min + Math.random() * (max - min)); }

function computeEquilibrium(state) {
  if (!state || !state.players) return { price: 0, quantity: 0 };
  const players = Object.values(state.players);
  const buyers = players.filter(p => p.role === "buyer").sort((a, b) => b.valuation - a.valuation);
  const sellers = players.filter(p => p.role === "seller").sort((a, b) => a.valuation - b.valuation);

  let eqQ = 0;
  for (let i = 0; i < Math.min(buyers.length, sellers.length); i++) {
    if (buyers[i].valuation >= sellers[i].valuation) eqQ = i + 1;
    else break;
  }
  if (eqQ === 0) return { price: 0, quantity: 0, buyers, sellers };
  const p = Math.round((sellers[eqQ - 1].valuation + buyers[eqQ - 1].valuation) / 2);
  return { price: p, quantity: eqQ, buyers, sellers };
}

function getTradesArray(state) {
  if (!state || !state.trades) return [];
  return Object.values(state.trades).sort((a, b) => a.time - b.time);
}

// ─── SVG CHART ───
function renderChart(state) {
  if (!state || !state.players) return '<div class="card text-center" style="color:var(--muted);padding:30px;">Belum ada data</div>';

  const players = Object.values(state.players);
  const buyers = players.filter(p => p.role === "buyer").sort((a, b) => b.valuation - a.valuation);
  const sellers = players.filter(p => p.role === "seller").sort((a, b) => a.valuation - b.valuation);
  const trades = getTradesArray(state);
  const eq = computeEquilibrium(state);

  const W = 560, H = 340;
  const pad = { top: 30, right: 30, bottom: 50, left: 70 };
  const w = W - pad.left - pad.right;
  const h = H - pad.top - pad.bottom;

  const allVals = players.map(p => p.valuation);
  if (allVals.length === 0) return '';
  const maxP = Math.max(...allVals) * 1.15;
  const minP = Math.min(...allVals) * 0.75;
  const maxQ = Math.max(buyers.length, sellers.length) + 2;

  const xS = (q) => pad.left + (q / maxQ) * w;
  const yS = (p) => pad.top + h - ((p - minP) / (maxP - minP)) * h;

  // Demand path
  const dPath = buyers.map((b, i) => `${i === 0 ? "M" : "L"}${xS(i + 1).toFixed(1)},${yS(b.valuation).toFixed(1)}`).join(" ");
  // Supply path
  const sPath = sellers.map((s, i) => `${i === 0 ? "M" : "L"}${xS(i + 1).toFixed(1)},${yS(s.valuation).toFixed(1)}`).join(" ");

  // Y ticks
  const numT = 5;
  const step = (maxP - minP) / numT;
  const yTicks = Array.from({ length: numT + 1 }, (_, i) => Math.round(minP + i * step));

  // X ticks
  const xTicks = [];
  for (let i = 1; i <= maxQ; i++) { if (i % 5 === 0 || i === 1) xTicks.push(i); }

  // Trades dots
  const tradeDots = trades.map((t, i) =>
    `<circle cx="${xS(i + 1).toFixed(1)}" cy="${yS(t.price).toFixed(1)}" r="5" fill="var(--purple)" stroke="var(--bg3)" stroke-width="1.5" opacity="0.9"><animate attributeName="r" from="9" to="5" dur="0.4s" fill="freeze"/></circle>`
  ).join("");

  // Equilibrium lines
  let eqSvg = "";
  if (eq.quantity > 0) {
    eqSvg = `
      <line x1="${xS(eq.quantity)}" x2="${xS(eq.quantity)}" y1="${yS(eq.price)}" y2="${pad.top + h}" stroke="var(--yellow)" stroke-width="1.5" stroke-dasharray="6,4"/>
      <line x1="${pad.left}" x2="${xS(eq.quantity)}" y1="${yS(eq.price)}" y2="${yS(eq.price)}" stroke="var(--yellow)" stroke-width="1.5" stroke-dasharray="6,4"/>
      <circle cx="${xS(eq.quantity)}" cy="${yS(eq.price)}" r="6" fill="var(--yellow)" stroke="var(--bg3)" stroke-width="2"/>
      <text x="${xS(eq.quantity) + 10}" y="${yS(eq.price) - 8}" fill="var(--yellow)" font-size="11" font-weight="700" font-family="JetBrains Mono,monospace">E: ${fmt(eq.price)} × ${eq.quantity}</text>
    `;
  }

  // Price ceiling line
  let ceilingSvg = "";
  if (state.priceCeiling) {
    const cy = yS(state.priceCeiling);
    ceilingSvg = `
      <line x1="${pad.left}" x2="${W - pad.right}" y1="${cy}" y2="${cy}" stroke="var(--red)" stroke-width="2" stroke-dasharray="8,4"/>
      <text x="${W - pad.right - 4}" y="${cy - 6}" fill="var(--red)" font-size="10" font-weight="700" text-anchor="end" font-family="JetBrains Mono,monospace">HET ${fmt(state.priceCeiling)}</text>
    `;
  }

  return `<div class="chart-wrap">
    <svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="background:var(--bg3);border-radius:12px;">
      ${yTicks.map(t => `<line x1="${pad.left}" x2="${W - pad.right}" y1="${yS(t)}" y2="${yS(t)}" stroke="var(--border)" stroke-width="0.5"/>`).join("")}
      <line x1="${pad.left}" x2="${pad.left}" y1="${pad.top}" y2="${pad.top + h}" stroke="#3a4a6a" stroke-width="1.5"/>
      <line x1="${pad.left}" x2="${pad.left + w}" y1="${pad.top + h}" y2="${pad.top + h}" stroke="#3a4a6a" stroke-width="1.5"/>
      ${yTicks.map(t => `<text x="${pad.left - 8}" y="${yS(t) + 4}" text-anchor="end" fill="var(--label)" font-size="10" font-family="JetBrains Mono,monospace">${fmt(t)}</text>`).join("")}
      ${xTicks.map(t => `<text x="${xS(t)}" y="${pad.top + h + 18}" text-anchor="middle" fill="var(--label)" font-size="10" font-family="JetBrains Mono,monospace">${t}</text>`).join("")}
      <text x="${W / 2}" y="${H - 4}" text-anchor="middle" fill="var(--label)" font-size="11" font-weight="600">Quantity</text>
      <text x="14" y="${H / 2}" text-anchor="middle" fill="var(--label)" font-size="11" font-weight="600" transform="rotate(-90,14,${H / 2})">Price (${state.unit || "Rp"})</text>
      <path d="${dPath}" fill="none" stroke="var(--cyan)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="${xS(buyers.length) + 6}" y="${yS(buyers[buyers.length - 1]?.valuation || 0)}" fill="var(--cyan)" font-size="12" font-weight="700">D</text>
      <path d="${sPath}" fill="none" stroke="var(--red)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="${xS(sellers.length) + 6}" y="${yS(sellers[sellers.length - 1]?.valuation || 0)}" fill="var(--red)" font-size="12" font-weight="700">S</text>
      ${eqSvg}
      ${ceilingSvg}
      ${tradeDots}
      <rect x="${W - 165}" y="6" width="155" height="68" rx="6" fill="var(--bg2)" stroke="var(--border)" stroke-width="0.5"/>
      <circle cx="${W - 148}" cy="22" r="4" fill="var(--cyan)"/><text x="${W - 138}" y="26" fill="#ccc" font-size="9">Demand (WTP)</text>
      <circle cx="${W - 148}" cy="38" r="4" fill="var(--red)"/><text x="${W - 138}" y="42" fill="#ccc" font-size="9">Supply (WTA)</text>
      <circle cx="${W - 148}" cy="54" r="4" fill="var(--yellow)"/><text x="${W - 138}" y="58" fill="#ccc" font-size="9">Equilibrium</text>
      <circle cx="${W - 148}" cy="70" r="4" fill="var(--purple)"/><text x="${W - 138}" y="74" fill="#ccc" font-size="9">Transaksi aktual</text>
    </svg>
  </div>`;
}

// ─── TEACHER VIEW ───
function showTeacher() {
  if (unsubscribe) unsubscribe();

  // Listen to market state
  unsubscribe = onValue(ref(db, "market"), (snap) => {
    marketState = snap.val();
    renderTeacherUI();
  });
}

function renderTeacherUI() {
  const state = marketState;

  if (!state || !state.phase || state.phase === "idle") {
    renderSetupScreen();
    return;
  }

  // === FINAL LEADERBOARD ===
  if (state.phase === "final") {
    renderFinalLeaderboard(state);
    return;
  }

  const players = state.players ? Object.values(state.players) : [];
  const joinedB = players.filter(p => p.role === "buyer" && p.joined).length;
  const joinedS = players.filter(p => p.role === "seller" && p.joined).length;

let selectedScenario = "minyak";

window._selectScenario = function(key, el) {
  selectedScenario = key;
  document.querySelectorAll(".radio-opt").forEach(e => e.classList.remove("active"));
  el.classList.add("active");
};

window._createMarket = async function() {
  const sc = SCENARIOS[selectedScenario];
  const total = parseInt(document.getElementById("num-students")?.value) || 42;
  const totalRounds = parseInt(document.getElementById("num-rounds")?.value) || 3;
  const numSellers = Math.floor(total / 2);
  const numBuyers = total - numSellers;
  const players = {};

  for (let i = 1; i <= numBuyers; i++) {
    const bid = `B${String(i).padStart(2, "0")}`;
    players[bid] = { id: bid, role: "buyer", valuation: rng(sc.buyerMin, sc.buyerMax), name: "", joined: false, totalSurplus: 0 };
  }
  for (let i = 1; i <= numSellers; i++) {
    const sid = `S${String(i).padStart(2, "0")}`;
    players[sid] = { id: sid, role: "seller", valuation: rng(sc.sellerMin, sc.sellerMax), name: "", joined: false, totalSurplus: 0 };
  }

  await set(ref(db, "market"), {
    phase: "join",
    good: sc.good,
    unit: sc.unit,
    round: 1,
    totalRounds: totalRounds,
    numBuyers: numBuyers,
    numSellers: numSellers,
    players: players,
    trades: {},
    pending: {},
    roundHistory: {},
    priceCeiling: null,
    shockLabel: null,
    createdAt: Date.now(),
  });
};

window._openTrading = async function() {
  await update(ref(db, "market"), { phase: "trade" });
};

window._closeTrading = async function() {
  const snap = await get(ref(db, "market"));
  const state = snap.val();
  if (!state) return;

  const trades = state.trades ? Object.values(state.trades) : [];
  const updates = {};

  // Calculate surplus for each trade and accumulate to players
  trades.forEach(t => {
    const buyer = state.players[t.buyerId];
    const seller = state.players[t.sellerId];
    if (buyer && seller) {
      const buyerSurplus = buyer.valuation - t.price;
      const sellerSurplus = t.price - seller.valuation;
      updates[`players/${t.buyerId}/totalSurplus`] = (buyer.totalSurplus || 0) + buyerSurplus;
      updates[`players/${t.sellerId}/totalSurplus`] = (seller.totalSurplus || 0) + sellerSurplus;
    }
  });

  // Save round history
  updates[`roundHistory/round_${state.round}`] = {
    trades: state.trades || {},
    round: state.round,
    shockLabel: state.shockLabel || null,
    priceCeiling: state.priceCeiling || null,
  };

  const currentRound = state.round || 1;
  const totalRounds = state.totalRounds || 3;

  if (currentRound >= totalRounds) {
    // Final round — show leaderboard
    updates["phase"] = "final";
  } else {
    // Show results, then dosen can start next round
    updates["phase"] = "results";
  }

  await update(ref(db, "market"), updates);
};

window._nextRound = async function() {
  const snap = await get(ref(db, "market"));
  const state = snap.val();
  if (!state) return;

  const sc = SCENARIOS[selectedScenario] || { buyerMin: 10000, buyerMax: 22000, sellerMin: 8000, sellerMax: 18000 };
  const updates = {};

  // Re-randomize valuations for new round
  Object.entries(state.players).forEach(([id, p]) => {
    if (p.role === "buyer") {
      updates[`players/${id}/valuation`] = rng(sc.buyerMin, sc.buyerMax);
    } else {
      updates[`players/${id}/valuation`] = rng(sc.sellerMin, sc.sellerMax);
    }
  });

  updates["round"] = (state.round || 1) + 1;
  updates["trades"] = {};
  updates["pending"] = {};
  updates["phase"] = "trade";
  updates["shockLabel"] = null;
  updates["priceCeiling"] = null;

  await update(ref(db, "market"), updates);
};

window._resetMarket = async function() {
  if (!confirm("Reset pasar? Semua data akan hilang.")) return;
  await set(ref(db, "market"), { phase: "idle" });
};

window._applyShock = async function(type) {
  const snap = await get(ref(db, "market"));
  const state = snap.val();
  if (!state || !state.players) return;

  const updates = {};

  if (type === "demand_up") {
    Object.entries(state.players).forEach(([id, p]) => {
      if (p.role === "buyer") {
        updates[`players/${id}/valuation`] = Math.round(p.valuation * 1.3);
      }
    });
    updates["shockLabel"] = "🔺 Demand Shock: WTP naik 30%";
  } else if (type === "supply_down") {
    Object.entries(state.players).forEach(([id, p]) => {
      if (p.role === "seller") {
        updates[`players/${id}/valuation`] = Math.round(p.valuation * 1.3);
      }
    });
    updates["shockLabel"] = "🔺 Supply Shock: WTA naik 30% (biaya produksi naik)";
  } else if (type === "price_ceiling") {
    const eq = computeEquilibrium(state);
    updates["priceCeiling"] = Math.round(eq.price * 0.7);
    updates["shockLabel"] = `⛔ Price Ceiling: HET ${fmt(Math.round(eq.price * 0.7))}`;
  }

  updates["trades"] = {};
  updates["pending"] = {};
  updates["phase"] = "trade";
  updates["round"] = (state.round || 1) + 1;

  await update(ref(db, "market"), updates);
};

          <div class="stat-num" style="color:var(--yellow);font-size:22px;">+${fmt(me.totalSurplus || 0)}</div>
        </div>
        <div style="color:var(--muted);font-size:13px;margin-top:10px;text-align:center;" class="waiting-pulse">⏳ Menunggu dosen memulai round berikutnya...</div>
      </div>`;
  }

  if (state.phase === "final") {
    const allPlayers = Object.values(state.players).filter(p => p.joined).sort((a, b) => (b.totalSurplus || 0) - (a.totalSurplus || 0));
    const myRank = allPlayers.findIndex(p => p.id === playerId) + 1;
    const medals = ["🥇", "🥈", "🥉"];
    phaseUI = `
      <div class="text-center" style="padding:20px 0;">
        <div style="font-size:56px;margin-bottom:8px;">${myRank <= 3 ? medals[myRank - 1] : "🏆"}</div>
        <h2 style="color:var(--yellow);font-size:20px;margin-bottom:4px;">Game Selesai!</h2>
        <p style="color:var(--label);font-size:14px;margin-bottom:16px;">Peringkat kamu: <strong style="color:var(--yellow);">#${myRank}</strong> dari ${allPlayers.length} pemain</p>
        <div class="card">
          <div class="stat-label">Total Surplus Kamu</div>
          <div class="stat-num" style="color:var(--yellow);font-size:28px;">${(me.totalSurplus || 0) > 0 ? "+" : ""}${fmt(me.totalSurplus || 0)}</div>
        </div>
        <div class="card mt-12" style="text-align:left;">
          <div style="color:var(--label);font-size:12px;margin-bottom:8px;">🏆 Top 10</div>
          ${allPlayers.slice(0, 10).map((p, i) => `
            <div style="display:flex;justify-content:space-between;padding:6px 8px;border-radius:4px;${p.id === playerId ? "background:var(--yellow-bg);border:1px solid var(--yellow);" : i % 2 === 0 ? "background:var(--bg3);" : ""}">
              <span style="color:${p.id === playerId ? "var(--yellow)" : "var(--text)"};font-size:13px;">${i < 3 ? medals[i] : (i+1)+"."} ${p.name || p.id}</span>
              <span style="color:var(--yellow);font-size:13px;font-family:'JetBrains Mono',monospace;font-weight:700;">+${fmt(p.totalSurplus || 0)}</span>
            </div>
          `).join("")}
        </div>
      </div>`;
  }

  document.getElementById("app").innerHTML = `
    <div class="container">
      <div style="background:${isBuyer ? "linear-gradient(135deg, #0d2520, #0a1a18)" : "linear-gradient(135deg, #200d0d, #1a0a0a)"};border-radius:12px;padding:16px;margin-bottom:16px;border:2px solid ${isBuyer ? "#4ecdc430" : "#ff6b6b30"};">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="color:var(--label);font-size:11px;">${playerId} — ${me.name} | Round ${state.round || 1}/${state.totalRounds || "?"}</div>
            <div style="color:${isBuyer ? "var(--cyan)" : "var(--red)"};font-size:22px;font-weight:800;margin-top:4px;">
              ${isBuyer ? "🛒 BUYER" : "🏪 SELLER"}
            </div>
          </div>
          <div style="text-align:right;">
            <div style="color:var(--label);font-size:11px;">${isBuyer ? "Max WTP" : "Min WTA"}</div>
            <div style="color:var(--yellow);font-size:24px;font-weight:800;font-family:'JetBrains Mono',monospace;">${fmt(me.valuation)}</div>
          </div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:10px;padding:8px 12px;background:#0a0f1a80;border-radius:6px;font-size:12px;color:var(--label);">
          <span>${isBuyer
            ? `Max bayar Rp${fmt(me.valuation)} untuk ${state.good}`
            : `Min jual Rp${fmt(me.valuation)} untuk ${state.good}`}</span>
          <span style="color:var(--yellow);font-weight:700;">Σ +${fmt(me.totalSurplus || 0)}</span>
        </div>
      </div>

      ${state.priceCeiling ? `<div class="msg msg-err mb-12">⛔ HET aktif: harga tidak boleh di atas ${fmt(state.priceCeiling)}</div>` : ""}
      ${state.shockLabel ? `<div class="msg msg-warn mb-12">${state.shockLabel}</div>` : ""}

      ${phaseUI}

      <div style="height:40px;"></div>
    </div>`;

  // Restore input values after re-render
  const partnerEl = document.getElementById("partner-input");
  const priceEl = document.getElementById("price-input");
  const msgEl = document.getElementById("trade-msg");
  if (partnerEl && savedPartner) partnerEl.value = savedPartner;
  if (priceEl && savedPrice) priceEl.value = savedPrice;
  if (msgEl && savedMsg) msgEl.innerHTML = savedMsg;
}

window._back = function() {
  currentRole = null;
  showRoleSelect();
};

window._joinGame = async function(playerId) {
  const nameInput = document.getElementById("name-input");
  if (!nameInput || !nameInput.value.trim()) return;

  await update(ref(db, `market/players/${playerId}`), {
    name: nameInput.value.trim(),
    joined: true,
  });
};

window._submitTrade = async function(playerId) {
  const partnerRaw = document.getElementById("partner-input")?.value?.toUpperCase()?.trim();
  const priceRaw = parseInt(document.getElementById("price-input")?.value);
  const msgEl = document.getElementById("trade-msg");

  const showMsg = (text, ok, warn) => {
    const cls = ok ? "msg-ok" : warn ? "msg-warn" : "msg-err";
    if (msgEl) msgEl.innerHTML = `<div class="msg ${cls} mt-12">${text}</div>`;
  };

  if (!partnerRaw || !priceRaw) { showMsg("❌ Isi partner ID dan harga", false); return; }

  // Get fresh state
  const snap = await get(ref(db, "market"));
  const state = snap.val();
  if (!state || !state.players) { showMsg("❌ Market belum aktif", false); return; }

  const me = state.players[playerId];
  if (!me) { showMsg("❌ Player tidak ditemukan", false); return; }

  const isBuyer = me.role === "buyer";
  const partner = state.players[partnerRaw];
  if (!partner) { showMsg(`❌ ID "${partnerRaw}" tidak ditemukan`, false); return; }

  // Check price ceiling
  if (state.priceCeiling && priceRaw > state.priceCeiling) {
    showMsg(`⛔ Harga melebihi HET (${fmt(state.priceCeiling)})`, false); return;
  }

  // Validate roles
  if (isBuyer && partner.role !== "seller") { showMsg("❌ Partner harus seller (S01–S..)", false); return; }
  if (!isBuyer && partner.role !== "buyer") { showMsg("❌ Partner harus buyer (B01–B..)", false); return; }

  // Validate price against valuations
  if (isBuyer && priceRaw > me.valuation) { showMsg(`❌ Harga ${fmt(priceRaw)} melebihi WTP kamu (${fmt(me.valuation)})`, false); return; }
  if (!isBuyer && priceRaw < me.valuation) { showMsg(`❌ Harga ${fmt(priceRaw)} di bawah WTA kamu (${fmt(me.valuation)})`, false); return; }

  // Check not already traded
  const existingTrades = state.trades ? Object.values(state.trades) : [];
  if (existingTrades.find(t => t.buyerId === playerId || t.sellerId === playerId)) {
    showMsg("❌ Kamu sudah bertransaksi di round ini", false); return;
  }
  if (existingTrades.find(t => t.buyerId === partnerRaw || t.sellerId === partnerRaw)) {
    showMsg("❌ Partner sudah bertransaksi", false); return;
  }

  // === DOUBLE CONFIRMATION SYSTEM ===
  const buyerId = isBuyer ? playerId : partnerRaw;
  const sellerId = isBuyer ? partnerRaw : playerId;
  const pendingKey = `${buyerId}_${sellerId}`;

  // Save my submission as pending
  await update(ref(db, `market/pending/${pendingKey}/${playerId}`), {
    partnerId: partnerRaw,
    price: priceRaw,
    time: Date.now()
  });

  // Check if partner already submitted
  const pendingSnap = await get(ref(db, `market/pending/${pendingKey}/${partnerRaw}`));
  const partnerPending = pendingSnap.val();

  if (!partnerPending) {
    // Partner belum submit
    showMsg(`⏳ Menunggu ${partnerRaw} konfirmasi. Kamu submit harga ${fmt(priceRaw)}. Partner harus input harga yang SAMA.`, false, true);
    return;
  }

  // Partner sudah submit — cek harga sama
  if (partnerPending.price !== priceRaw) {
    showMsg(`❌ Harga tidak cocok! Kamu: ${fmt(priceRaw)}, ${partnerRaw}: ${fmt(partnerPending.price)}. Nego ulang dan pastikan harga SAMA persis.`, false);
    // Hapus pending saya supaya bisa re-submit
    await set(ref(db, `market/pending/${pendingKey}/${playerId}`), null);
    return;
  }

  // Partner ID cross-check
  if (partnerPending.partnerId !== playerId) {
    showMsg(`❌ ${partnerRaw} tidak memilih kamu sebagai partner.`, false);
    await set(ref(db, `market/pending/${pendingKey}/${playerId}`), null);
    return;
  }

  // === MATCH! Harga sama, partner sama — finalize trade ===
  await update(ref(db, `market/trades/${pendingKey}`), {
    buyerId, sellerId, price: priceRaw, time: Date.now()
  });

  // Clean up pending
  await set(ref(db, `market/pending/${pendingKey}`), null);

  showMsg("✅ Transaksi berhasil! Kedua pihak setuju.", true);
};

// ─── START ───
init();

</script>

<div id="app">
  <div class="loading-screen">Loading...</div>
</div>
